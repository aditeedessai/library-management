<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Books - Mini Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="css/common.css">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <a class="logo" href="index.html">
                <h1>Mini Library</h1>
            </a>

            <nav class="nav">
                <a href="books.html">Books</a>
                <a href="members.html">Members</a>
                <a href="issued.html">Issued</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <h2>Books</h2>

            <div class="form-row">
                <input id="title" placeholder="Title">
                <input id="author" placeholder="Author">
                <input id="publisher" placeholder="Publisher">

                <button id="addBtn" class="btn">
                    Add Book
                </button>
            </div>

            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Publisher</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="booksBody"></tbody>
            </table>
        </section>
    </main>

    <script type="module" src="js/books.js"></script>
</body>
</html>
