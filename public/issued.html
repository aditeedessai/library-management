<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Issued - Mini Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="css/common.css">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <a class="logo" href="index.html">
                <h1>Mini Library</h1>
            </a>

            <nav class="nav">
                <a href="books.html">Books</a>
                <a href="members.html">Members</a>
                <a href="issued.html">Issued</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <h2>Issued Records</h2>

            <div class="form-row">
                <select id="selMember"></select>

                <select id="selBook"></select>

                <input id="issuedate" type="date">

                <input id="returndate" type="date">

                <button id="issueBtn" class="btn">
                    Issue
                </button>
            </div>

            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Member</th>
                        <th>Book</th>
                        <th>IssueDate</th>
                        <th>ReturnDate</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="issuedBody"></tbody>
            </table>
        </section>
    </main>

    <script type="module" src="js/issued.js"></script>
</body>
</html>
